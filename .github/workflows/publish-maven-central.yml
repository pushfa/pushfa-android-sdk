name: Publish to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version already declared in PushfaSdkInfo
        required: true
        type: string
  push:
    branches:
      - main
    tags:
      - "*.*.*"

permissions:
  contents: read

concurrency:
  group: maven-central-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.repository == 'pushfa/pushfa-android-sdk' &&
      (github.ref_type == 'tag' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[publish-maven-central]'))
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event_name == 'workflow_dispatch' && inputs.version || '2.0.4' }}
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}

    steps:
      - name: Check out release source
        uses: actions/checkout@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify release version
        shell: bash
        run: |
          if ! grep -Fq "const val VERSION = \"${RELEASE_VERSION}\"" pushfa/src/main/java/com/pushfa/sdk/internal/PushfaApi.kt; then
            echo "Release version ${RELEASE_VERSION} does not match PushfaSdkInfo.VERSION."
            exit 1
          fi

      - name: Verify publishing secrets
        shell: bash
        run: |
          for variable in \
            ORG_GRADLE_PROJECT_mavenCentralUsername \
            ORG_GRADLE_PROJECT_mavenCentralPassword \
            ORG_GRADLE_PROJECT_signingInMemoryKey \
            ORG_GRADLE_PROJECT_signingInMemoryKeyPassword; do
            if [ -z "${!variable}" ]; then
              echo "Required GitHub Actions secret for ${variable} is missing."
              exit 1
            fi
          done

      - name: Publish and release Maven Central deployment
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: ./gradlew :pushfa:publishAndReleaseToMavenCentral --no-daemon
